name: Build Sources APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew :sources:assembleRelease

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find sources/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Bump manifest version and sync sources list
        id: bump
        run: |
          python3 - <<'EOF'
          import json, os, glob

          with open("manifest.json") as f:
              m = json.load(f)

          # Integer versioning — parse major component if string, then increment
          v = m.get("version", 0)
          new_version = int(str(v).split(".")[0]) + 1
          m["version"] = new_version

          # Auto-sync sources list from actual provider files
          source_dir = "sources/src/main/java/com/kmhmubin/kothagolp/sources"
          providers = []
          for kt_file in sorted(glob.glob(f"{source_dir}/*.kt")):
              class_name = os.path.basename(kt_file).replace(".kt", "")
              if class_name.endswith("Provider"):
                  provider_id = class_name.replace("Provider", "").lower()
                  providers.append({
                      "id": provider_id,
                      "class": f"com.kmhmubin.kothagolp.sources.{class_name}"
                  })
          m["sources"] = providers

          with open("manifest.json", "w") as f:
              json.dump(m, f, indent=2)

          print(f"Version bumped to {new_version}, {len(providers)} providers")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"version={new_version}\n")
          EOF

      - name: Copy APK
        run: cp "${{ steps.apk.outputs.path }}" sources.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: "Sources v${{ steps.bump.outputs.version }}"
          files: sources.apk
          generate_release_notes: false

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: bump sources version [skip ci]" || echo "Nothing to commit"
          git push
